[pytest]
# test_phase1.py is a standalone validation script meant to be run directly
# (python tests/test_phase1.py), not a pytest suite. Its test_*-prefixed
# helper functions (test_header, test_pass, ...) and threaded local
# variables (df, features, report) aren't real tests or fixtures, but
# pytest's auto-discovery mistakes them for both and errors out trying to
# resolve them.
addopts = --ignore=tests/test_phase1.py
